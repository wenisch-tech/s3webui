<!DOCTYPE html>
<html lang="en"
    data-bs-theme="light"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <script>(function(){var t=localStorage.getItem('s3webui-theme')||'light';document.documentElement.setAttribute('data-bs-theme',t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>S3WEBUI</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}" href="/img/logo.png"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="app-shell">

<main class="app-main d-flex align-items-center justify-content-center">
<div class="container text-center" style="max-width: 480px">
    <i class="bi bi-shield-x display-1 text-danger mb-3"></i>
    <h1 class="h3 fw-semibold">Access Denied</h1>
    <p class="text-muted mb-1">You do not have permission to access this page.</p>
    <p class="text-muted small mb-4" th:if="${oidcRequiredRole != null and !oidcRequiredRole.isEmpty()}">
        Required role: <code th:text="${oidcRequiredRole}">role</code>
    </p>

    <div class="d-flex gap-2 justify-content-center">
        <a th:href="@{/}" class="btn btn-outline-secondary">
            <i class="bi bi-house me-1"></i>Home
        </a>
        <form th:if="${oidcEnabled}" th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-box-arrow-right me-1"></i>Sign out
            </button>
        </form>
    </div>
</div>
</main>

<div th:replace="~{fragments/app-meta :: appMeta}"></div>
<div th:replace="~{fragments/app-meta :: appAttribution}"></div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
