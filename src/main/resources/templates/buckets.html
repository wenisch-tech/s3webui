<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Buckets — S3 Web UI</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-body-tertiary">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" th:href="@{/}">
            <i class="bi bi-cloud-fill fs-4"></i>
            S3 Web UI
        </a>
    </div>
</nav>

<div class="container-fluid px-4 py-4">

    <!-- Error alert -->
    <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}">Error connecting to S3</span>
    </div>

    <!-- Header row -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h1 class="h3 mb-0 fw-semibold">Buckets</h1>
            <p class="text-muted small mb-0" th:text="${#lists.size(buckets)} + ' bucket(s)'">0 buckets</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createBucketModal">
            <i class="bi bi-plus-lg me-1"></i>New Bucket
        </button>
    </div>

    <!-- Buckets grid -->
    <div class="row g-3" th:if="${!#lists.isEmpty(buckets)}">
        <div class="col-12 col-sm-6 col-md-4 col-xl-3" th:each="bucket : ${buckets}">
            <div class="card h-100 bucket-card shadow-sm border-0">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex align-items-start justify-content-between mb-3">
                        <div class="bucket-icon rounded-3 d-flex align-items-center justify-content-center">
                            <i class="bi bi-bucket-fill text-primary fs-3"></i>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-sm btn-light rounded-circle" data-bs-toggle="dropdown">
                                <i class="bi bi-three-dots-vertical"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" th:href="@{/buckets/{b}(b=${bucket.name})}">
                                        <i class="bi bi-folder2-open me-2"></i>Browse
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"/></li>
                                <li>
                                    <button class="dropdown-item text-danger"
                                            th:attr="data-bucket=${bucket.name}"
                                            onclick="confirmDeleteBucket(this.dataset.bucket)">
                                        <i class="bi bi-trash3 me-2"></i>Delete
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <a th:href="@{/buckets/{b}(b=${bucket.name})}"
                       class="text-decoration-none text-body fw-semibold stretched-link mb-1"
                       th:text="${bucket.name}">bucket-name</a>
                    <small class="text-muted mt-auto"
                           th:text="${bucket.creationDate != null ? #temporals.format(bucket.creationDate, 'yyyy-MM-dd') : 'Unknown date'}">
                        2024-01-01
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div class="text-center py-5" th:if="${#lists.isEmpty(buckets) and error == null}">
        <i class="bi bi-bucket display-1 text-muted"></i>
        <p class="lead mt-3 text-muted">No buckets found</p>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createBucketModal">
            <i class="bi bi-plus-lg me-1"></i>Create your first bucket
        </button>
    </div>

</div>

<!-- Create bucket modal -->
<div class="modal fade" id="createBucketModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-bucket me-2"></i>New Bucket</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="bucketName" class="form-label">Bucket name</label>
                    <input type="text" class="form-control" id="bucketName"
                           placeholder="my-bucket" autocomplete="off"/>
                    <div class="form-text">Bucket names must be lowercase, 3–63 characters.</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="createBucket()">Create</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete bucket confirmation modal -->
<div class="modal fade" id="deleteBucketModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger"><i class="bi bi-trash3 me-2"></i>Delete Bucket</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete bucket <strong id="deleteBucketName"></strong>?</p>
                <div class="alert alert-warning"><i class="bi bi-exclamation-triangle me-2"></i>
                    This action cannot be undone. Make sure the bucket is empty first.
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="doDeleteBucket()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    let _bucketToDelete = null;

    function confirmDeleteBucket(name) {
        _bucketToDelete = name;
        document.getElementById('deleteBucketName').textContent = name;
        new bootstrap.Modal(document.getElementById('deleteBucketModal')).show();
    }

    function doDeleteBucket() {
        if (!_bucketToDelete) return;
        fetch('/api/buckets/' + encodeURIComponent(_bucketToDelete), {method: 'DELETE'})
            .then(r => { if (r.ok) location.reload(); else r.text().then(t => showToast(t, 'danger')); })
            .catch(e => showToast(e.message, 'danger'));
    }

    function createBucket() {
        const name = document.getElementById('bucketName').value.trim();
        if (!name) return;
        fetch('/api/buckets?name=' + encodeURIComponent(name), {method: 'POST'})
            .then(r => { if (r.ok) location.reload(); else r.text().then(t => showToast(t, 'danger')); })
            .catch(e => showToast(e.message, 'danger'));
    }
</script>
</body>
</html>
