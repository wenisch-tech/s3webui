spring:
  application:
    name: s3webui
  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB
      file-size-threshold: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

s3:
  access-key: ${S3_ACCESS_KEY:}
  secret-key: ${S3_SECRET_KEY:}
  endpoint-url: ${S3_ENDPOINT_URL:}
  region: ${S3_REGION:}
  insecure-skip-tls-verify: ${S3_INSECURE_SKIP_TLS_VERIFY:false}

oidc:
  enabled: ${OIDC_ENABLED:false}
  client-id: ${OIDC_CLIENT_ID:}
  client-secret: ${OIDC_CLIENT_SECRET:}
  issuer-uri: ${OIDC_ISSUER_URI:}
  required-role: ${OIDC_REQUIRED_ROLE:}
  insecure-skip-tls-verify: ${OIDC_INSECURE_SKIP_TLS_VERIFY:false}
