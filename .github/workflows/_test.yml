name: Test

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      is_pull_request:
        required: false
        type: boolean
        default: false

jobs:
  test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set Maven version
        run: mvn -B versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Run tests and coverage verification
        run: mvn -B verify

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            target/surefire-reports/*.xml
            target/site/jacoco/jacoco.xml
            target/site/jacoco/index.html

      - name: Generate coverage summary
        if: always() && inputs.is_pull_request
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: target/site/jacoco/jacoco.xml
          format: markdown
          output: both
          indicators: true
          fail_below_min: false

      - name: Add coverage summary to pull request
        if: always() && inputs.is_pull_request
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Build JAR
        run: mvn -B -DskipTests package
