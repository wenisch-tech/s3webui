replicaCount: 1

image:
  registry: ghcr.io
  repository: wenisch-tech/s3webui
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: s3webui.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

# S3 connection configuration
env:
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_ENDPOINT_URL: ""
  S3_REGION: "us-east-1"
  S3_INSECURE_SKIP_TLS_VERIFY: "false"
  # OIDC / Keycloak (optional)
  OIDC_ENABLED: "false"
  OIDC_PROVIDER_NAME: "Single Sign-On"
  OIDC_CLIENT_ID: ""
  OIDC_ISSUER_URI: ""
  OIDC_REQUIRED_ROLE: ""
  OIDC_INSECURE_SKIP_TLS_VERIFY: "false"
  # Multi-provider example:
  # OIDC_PROVIDERS_0_NAME: "Company SSO"
  # OIDC_PROVIDERS_0_CLIENT_ID: "s3webui"
  # OIDC_PROVIDERS_0_ISSUER_URI: "https://auth.example.com/realms/main"
  # OIDC_PROVIDERS_1_NAME: "Partner Login"
  # OIDC_PROVIDERS_1_CLIENT_ID: "s3webui-partner"
  # OIDC_PROVIDERS_1_ISSUER_URI: "https://login.partner.example/realms/partner"

# Sensitive values (stored in a Kubernetes secret)
secrets: {}
  # S3_ACCESS_KEY: "your-access-key"
  # S3_SECRET_KEY: "your-secret-key"
  # OIDC_CLIENT_SECRET: "your-client-secret"
  # OIDC_PROVIDERS_0_CLIENT_SECRET: "your-client-secret"
  # OIDC_PROVIDERS_1_CLIENT_SECRET: "your-other-client-secret"

livenessProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
